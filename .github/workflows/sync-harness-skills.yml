name: Sync harness skills

# Pull shared agent skills from tribes-protocol/ai-harness-setup into .pi/skills/.
#
# WHY PULL, NOT PUSH: the alternative — ai-harness-setup firing a
# `repository_dispatch` at this repo whenever its skills change — would force that
# repo to hold a write-scoped PAT for THIS repo, a cross-repo secret with real blast
# radius. Instead this repo runs on a schedule, reads the *public* ai-harness-setup
# tarball unauthenticated, and opens a PR against itself with its own GITHUB_TOKEN.
# Zero new secrets.
#
# A `repository_dispatch:` trigger (e.g. type `skills-updated`) can be added below
# later for sub-6h latency WITHOUT changing any step — the job body is
# trigger-agnostic. That is a latency optimisation, not a requirement.
#
# NOTE: PRs opened with GITHUB_TOKEN do not themselves trigger `pull_request`
# workflows, so this job runs the full verify suite (format:check, lint, build,
# vitest — including SkillsContract + the drift guard) BEFORE opening the PR. A
# broken vendor set fails here and no PR is opened.

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-harness-skills
  cancel-in-progress: false

env:
  UPSTREAM_REPO: tribes-protocol/ai-harness-setup
  UPSTREAM_BRANCH: main
  SYNC_BRANCH: chore/sync-harness-skills

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve upstream commit
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(gh api "repos/$UPSTREAM_REPO/commits/$UPSTREAM_BRANCH" --jq '.sha')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream skills (public tarball, unauthenticated)
        env:
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          # Public repo: no auth header. codeload serves any public ref as a tarball.
          curl -fsSL "https://codeload.github.com/$UPSTREAM_REPO/tar.gz/$UPSTREAM_SHA" \
            -o "$tmp/src.tar.gz"
          mkdir -p "$tmp/extract"
          tar -xzf "$tmp/src.tar.gz" -C "$tmp/extract" --strip-components=1
          if [ -d "$tmp/extract/skills" ]; then
            echo "UPSTREAM_SKILLS=$tmp/extract/skills" >> "$GITHUB_ENV"
          else
            echo "UPSTREAM_SKILLS=" >> "$GITHUB_ENV"
            echo "Upstream has no skills/ directory yet — this run will be a no-op."
          fi

      - name: Vendor skills and regenerate routing map
        if: env.UPSTREAM_SKILLS != ''
        env:
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          set -euo pipefail
          bun .github/scripts/sync-harness-skills.mjs \
            --phase content \
            --source "$UPSTREAM_SKILLS"

      - name: Format (prettier writes the vendored markdown)
        if: env.UPSTREAM_SKILLS != ''
        run: bun run format

      - name: Write drift manifest (hash the formatted files)
        if: env.UPSTREAM_SKILLS != ''
        env:
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          set -euo pipefail
          bun .github/scripts/sync-harness-skills.mjs \
            --phase manifest \
            --source "$UPSTREAM_SKILLS" \
            --upstream-sha "$UPSTREAM_SHA"

      - name: Verify (format:check, lint, build, tests)
        if: env.UPSTREAM_SKILLS != ''
        run: |
          set -euo pipefail
          bun run format:check
          bun run lint
          bun run build
          bunx vitest run

      - name: Open or update the vendor PR
        if: env.UPSTREAM_SKILLS != ''
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo "Skills already up to date — no PR."
            exit 0
          fi
          short_sha="${UPSTREAM_SHA:0:12}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -B "$SYNC_BRANCH"
          git add -A
          git commit -m "chore(skills): sync shared skills from ai-harness-setup@$short_sha"
          git push --force-with-lease origin "$SYNC_BRANCH"
          if gh pr view "$SYNC_BRANCH" --json number --jq '.number' >/dev/null 2>&1; then
            echo "PR already open for $SYNC_BRANCH — branch updated."
          else
            gh pr create \
              --base main \
              --head "$SYNC_BRANCH" \
              --title "chore(skills): sync shared skills from ai-harness-setup" \
              --body "Automated pull of shared agent skills from \`tribes-protocol/ai-harness-setup@$short_sha\`.

          Vendored into \`.pi/skills/\` (which every tool dot-dir already symlinks). These files are machine-written — edit them upstream, never here; the drift guard (\`tests/skills/SyncedSkills.test.ts\`) enforces it via the \`.pi/skills/.synced.json\` hash manifest.

          CI's \`SkillsContract.test.ts\` validating this diff (frontmatter, caps, cross-refs, routing map) is the end-to-end integration test of the sync channel."
          fi
