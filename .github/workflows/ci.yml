name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Build the world (ata + extensions + all skills)
        run: bun run build

      - name: Tests (unit + skills contract)
        run: bunx vitest run

      - name: Shared skills inheritance contract
        run: sudo -E sh test/shared-skills-install.test.sh
